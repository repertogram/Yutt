<!DOCTYPE html>                                  <!-- Объявление типа документа HTML5 -->
<html lang="ru">                                 <!-- Корневой элемент, язык страницы — русский -->
<head>                                           <!-- Метаданные и подключения -->
    <meta charset="UTF-8">                       <!-- Кодировка UTF-8 для корректного отображения кириллицы -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Настройки для адаптивности на мобильных устройствах -->
            <!-- Ширина по ширине экрана, начальный масштаб 1 -->
    <title>Корзина</title>                       <!-- Заголовок вкладки браузера -->
    <link rel="stylesheet" href="../css/style.css">  <!-- Подключение общих стилей магазина (путь на уровень выше) -->
</head>
<body>                                           <!-- Начало видимого содержимого страницы -->

    <!-- ==================== ШАПКА САЙТА ==================== -->
    <header>                                     <!-- Верхняя часть сайта -->
        <div class="container">                  <!-- Центрирующий контейнер с ограничением ширины -->
            <div class="logo">                   <!-- Блок логотипа -->
                <a href="../index.html">Уют</a>   <!-- Ссылка на главную страницу (на уровень выше из папки html) -->
            </div>
            <nav>                                <!-- Навигационное меню -->
                <ul>                             <!-- Ненумерованный список пунктов меню -->
                    <li><a href="../index.html">Главная</a></li>      <!-- Ссылка на главную -->
                    <li><a href="catalog.html">Каталог</a></li>      <!-- Ссылка на каталог (в этой же папке) -->
                    <li>                                           <!-- Пункт "Корзина" -->
                        <a href="cart.html" class="cart-link">     <!-- Ссылка на текущую страницу корзины -->
                            Корзина 
                            <span class="cart-count">0</span>       <!-- Счётчик товаров в корзине (обновляется через JS) -->
                        </a>
                    </li>
                    <li><a href="admin.html">Админ</a></li>
                </ul>
            </nav>
            <!-- Кнопка переключения темы (светлая / тёмная) -->
            <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
        </div>
    </header>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ==================== -->
    <main>                                       <!-- Основная часть страницы -->
        <div class="container">                  <!-- Центрирующий контейнер -->
            <h1>Корзина</h1>                     <!-- Заголовок страницы -->
            <div id="cart-content"></div>        <!-- Контейнер, куда будет отрисована корзина через JavaScript -->
        </div>
    </main>

    <!-- ==================== ПОДКЛЮЧЕНИЕ СКРИПТОВ ==================== -->
    <!-- Файлы с данными и основной логикой магазина -->
    <script src="../js/data.js"></script>        <!-- Массив товаров и вспомогательные функции (products, getImagePath и т.д.) -->
    <script src="../js/cart.js"></script>        <!-- Функции работы с корзиной (getCart, addToCart, changeQuantity, getCartTotal и др.) -->
    
    <!-- ==================== СКРИПТ ОТРИСОВКИ КОРЗИНЫ (ВСТРОЕННЫЙ) ==================== -->
    <script>
        /**
         * Функция отрисовки содержимого корзины.
         * Получает корзину из localStorage, сопоставляет с товарами и генерирует HTML-таблицу.
         */
        function renderCart() {
            const container = document.getElementById('cart-content');  // Получаем элемент-контейнер
            const cart = getCart();                    // Получаем текущую корзину (массив {id, quantity})
            
            // Если корзина пуста — показываем сообщение и прекращаем выполнение
            if (cart.length === 0) {
                container.innerHTML = '<p>Ваша корзина пуста.</p>';
                return;
            }

            // Начинаем формировать HTML-код таблицы
            let html = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Товар</th>            <!-- Колонка с названием товара -->
                            <th>Цена</th>             <!-- Цена за единицу -->
                            <th>Количество</th>       <!-- Количество и кнопки изменения -->
                            <th>Сумма</th>            <!-- Общая стоимость позиции -->
                            <th></th>                 <!-- Кнопка удаления -->
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Перебираем все позиции в корзине
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);  // Находим товар по ID
                if (!product) return;                                  // Пропускаем, если товар не найден (на всякий случай)
                const itemTotal = product.price * item.quantity;       // Вычисляем стоимость позиции
                
                // Добавляем строку таблицы для текущего товара
                html += `
                    <tr>
                        <td>
                            <!-- Ссылка на страницу товара с классом для стилизации подчёркивания -->
                            <a href="product.html?id=${product.id}" class="cart-product-link">${product.name}</a>
                        </td>
                        <td>${product.price.toLocaleString()} ₽</td>   <!-- Форматированная цена -->
                        <td>
                            <div class="quantity-control">              <!-- Блок управления количеством -->
                                <button onclick="changeQuantity(${product.id}, -1)">-</button>  <!-- Уменьшить количество -->
                                <span>${item.quantity}</span>           <!-- Текущее количество -->
                                <button onclick="changeQuantity(${product.id}, 1)">+</button>   <!-- Увеличить количество -->
                            </div>
                        </td>
                        <td>${itemTotal.toLocaleString()} ₽</td>       <!-- Стоимость позиции с разделителями -->
                        <td>
                            <button class="btn btn-danger" onclick="removeFromCart(${product.id})">Удалить</button>  <!-- Кнопка удаления -->
                        </td>
                    </tr>
                `;
            });

            const total = getCartTotal();                               // Получаем общую сумму корзины
            // Добавляем закрывающие теги таблицы и блок с итоговой суммой, а также кнопку оформления заказа
            html += `
                    </tbody>
                </table>
                <div class="cart-total">
                    Итого: ${total.toLocaleString()} ₽
                </div>
                <a href="checkout.html" class="btn">Оформить заказ</a>  <!-- Ссылка на страницу оформления -->
            `;

            container.innerHTML = html;                                 // Вставляем сгенерированный HTML в контейнер
        }

        // Делаем функции changeQuantity и removeFromCart глобально доступными для вызова из onclick
        window.changeQuantity = changeQuantity;
        window.removeFromCart = removeFromCart;

        // После полной загрузки DOM выполняем отрисовку корзины и обновление счётчика в шапке
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateCartCount();
        });
    </script>

    <!-- Скрипт переключения тёмной темы -->
    <script src="../js/theme.js"></script>

    <!-- ==================== КОНТЕЙНЕР ДЛЯ УВЕДОМЛЕНИЙ ==================== -->
    <!-- Фиксированный блок в правом верхнем углу для всплывающих сообщений -->
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    
    <!-- ==================== СКРИПТ УВЕДОМЛЕНИЙ (ВСТРОЕННЫЙ) ==================== -->
    <script>
    (function() {                                          // Самовызывающаяся функция для создания локальной области видимости
        const container = document.getElementById('notification-container');  // Находим контейнер
        if (!container) return;                            // Если контейнера нет — выходим

        // Глобальная функция показа уведомлений (доступна из любого места)
        window.showNotification = function(message, type = 'success', duration = 3000) {
            const notification = document.createElement('div');   // Создаём div для уведомления
            notification.className = 'notification ' + type;      // Добавляем классы (notification и тип: success/error/warning/info)
            
            // Выбираем иконку в зависимости от типа уведомления
            let icon = '✅';
            if (type === 'error') icon = '❌';
            else if (type === 'warning') icon = '⚠️';
            else if (type === 'info') icon = 'ℹ️';

            // Заполняем внутреннюю структуру уведомления
            notification.innerHTML = `
                <span class="icon">${icon}</span>                <!-- Иконка -->
                <span class="message">${message}</span>          <!-- Текст сообщения -->
                <button class="close-btn">&times;</button>       <!-- Кнопка закрытия (крестик) -->
            `;
            container.appendChild(notification);                  // Добавляем уведомление в контейнер

            const closeBtn = notification.querySelector('.close-btn');  // Находим кнопку закрытия
            // Функция удаления уведомления с анимацией
            const remove = () => {
                notification.style.animation = 'fadeOut 0.2s forwards';  // Запускаем CSS-анимацию исчезновения
                setTimeout(() => notification.remove(), 200);            // Удаляем элемент из DOM после завершения анимации
            };
            closeBtn.addEventListener('click', remove);           // Закрытие по клику на крестик
            if (duration > 0) setTimeout(remove, duration);      // Автоматическое закрытие через заданное время (если duration > 0)
        };
        console.log('✅ showNotification готов');                // Отладочное сообщение в консоль
    })();
    </script>

</body>
</html>
