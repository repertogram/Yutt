<!DOCTYPE html>                                  <!-- Объявление типа документа HTML5 -->
<html lang="ru">                                 <!-- Корневой элемент, язык страницы – русский -->
<head>                                           <!-- Метаданные и подключения -->
    <meta charset="UTF-8">                       <!-- Кодировка UTF-8 для корректного отображения кириллицы -->
    <!-- Адаптивный вьюпорт: ширина равна ширине устройства, начальный масштаб 1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>                       <!-- Заголовок вкладки браузера -->
    <!-- Подключаем основные стили магазина (находимся в папке html, поэтому ../css/style.css) -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>                                           <!-- Видимое содержимое страницы -->

    <!-- ==================== ШАПКА САЙТА (общая для всех страниц) ==================== -->
    <header>                                     <!-- Верхняя часть сайта -->
        <div class="container">                  <!-- Центрирующий контейнер с ограничением ширины -->
            <div class="logo">                   <!-- Блок логотипа -->
                <a href="../index.html">Уют</a>   <!-- Ссылка на главную страницу (на уровень выше из папки html) -->
            </div>
            <nav>                                <!-- Навигационное меню -->
                <ul>                             <!-- Ненумерованный список пунктов меню -->
                    <li><a href="../index.html">Главная</a></li>      <!-- Ссылка на главную страницу -->
                    <li><a href="catalog.html">Каталог</a></li>      <!-- Ссылка на каталог (лежит в этой же папке) -->
                    <li>                                           <!-- Пункт "Корзина" (текущая страница) -->
                        <a href="cart.html" class="cart-link">     <!-- Ссылка на корзину -->
                            Корзина 
                            <span class="cart-count">0</span>       <!-- Счётчик товаров в корзине (обновляется JS) -->
                        </a>
                    </li>
                    <li><a href="admin.html">Админ</a></li>        <!-- Ссылка на админ-панель -->
                </ul>
            </nav>
            <!-- Кнопка переключения темы (светлая / тёмная) -->
            <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
        </div>
    </header>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ==================== -->
    <main>                                       <!-- Основная часть страницы -->
        <div class="container">                  <!-- Центрирующий контейнер -->
            <h1>Корзина</h1>                     <!-- Заголовок страницы -->
            <div id="cart-content"></div>        <!-- Контейнер, куда JavaScript отрисует содержимое корзины -->
        </div>
    </main>

    <!-- ==================== ПОДКЛЮЧЕНИЕ СКРИПТОВ ==================== -->
    <!-- Библиотека Supabase для работы с облачной базой данных -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Наш файл с инициализацией клиента Supabase (URL и ключ) -->
    <script src="../js/supabase.js"></script>
    <!-- Основные скрипты магазина -->
    <script src="../js/data.js"></script>        <!-- Управление товарами (загрузка из БД, массив products и т.д.) -->
    <script src="../js/cart.js"></script>        <!-- Логика корзины (getCart, addToCart, changeQuantity, getCartTotal и др.) -->

    <!-- ==================== СКРИПТ ОТРИСОВКИ КОРЗИНЫ ==================== -->
    <script>
        /**
         * Функция renderCart() – отрисовывает содержимое корзины на странице.
         * Она получает данные о товарах в корзине из localStorage,
         * сопоставляет их с глобальным массивом products (загруженным из БД)
         * и генерирует HTML-таблицу с товарами, количеством и общей суммой.
         */
        function renderCart() {
            // Получаем DOM-элемент, в который будем вставлять таблицу корзины
            const container = document.getElementById('cart-content');
            // Получаем текущую корзину из localStorage (массив объектов {id, quantity})
            const cart = getCart();

            // Если корзина пуста – выводим сообщение и завершаем функцию
            if (cart.length === 0) {
                container.innerHTML = '<p>Ваша корзина пуста.</p>';
                return;
            }

            // Начинаем формировать HTML-строку с открывающими тегами таблицы
            let html = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Товар</th>            <!-- Название товара -->
                            <th>Цена</th>             <!-- Цена за единицу -->
                            <th>Количество</th>       <!-- Количество и кнопки +/- -->
                            <th>Сумма</th>            <!-- Стоимость позиции -->
                            <th></th>                 <!-- Колонка для кнопки удаления -->
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Перебираем все элементы корзины
            cart.forEach(item => {
                // Ищем товар в глобальном массиве products по id
                const product = products.find(p => p.id === item.id);
                // Если товар не найден (например, был удалён из каталога), пропускаем его
                if (!product) return;
                // Вычисляем стоимость позиции (цена * количество)
                const itemTotal = product.price * item.quantity;

                // Добавляем строку таблицы для данного товара
                html += `
                    <tr>
                        <td>
                            <!-- Ссылка на страницу товара, с классом для красивого подчёркивания -->
                            <a href="product.html?id=${product.id}" class="cart-product-link">${product.name}</a>
                        </td>
                        <td>${product.price.toLocaleString()} ₽</td>   <!-- Цена с разделителями тысяч -->
                        <td>
                            <div class="quantity-control">              <!-- Блок управления количеством -->
                                <button onclick="changeQuantity(${product.id}, -1)">-</button>  <!-- Уменьшить -->
                                <span>${item.quantity}</span>           <!-- Текущее количество -->
                                <button onclick="changeQuantity(${product.id}, 1)">+</button>   <!-- Увеличить -->
                            </div>
                        </td>
                        <td>${itemTotal.toLocaleString()} ₽</td>       <!-- Стоимость позиции -->
                        <td>
                            <!-- Кнопка удаления товара из корзины -->
                            <button class="btn btn-danger" onclick="removeFromCart(${product.id})">Удалить</button>
                        </td>
                    </tr>
                `;
            });

            // Получаем общую сумму корзины с помощью функции getCartTotal
            const total = getCartTotal();

            // Закрываем таблицу, добавляем блок с итоговой суммой и кнопку оформления заказа
            html += `
                    </tbody>
                </table>
                <div class="cart-total">
                    Итого: ${total.toLocaleString()} ₽
                </div>
                <a href="checkout.html" class="btn">Оформить заказ</a>
            `;

            // Вставляем сгенерированный HTML в контейнер на странице
            container.innerHTML = html;
        }

        // Делаем функции changeQuantity и removeFromCart глобально доступными,
        // чтобы они могли вызываться из атрибутов onclick в кнопках
        window.changeQuantity = changeQuantity;
        window.removeFromCart = removeFromCart;

        // После полной загрузки DOM-дерева выполняем начальную загрузку данных и отрисовку
        document.addEventListener('DOMContentLoaded', async () => {
            // Сначала загружаем товары из облачной базы данных Supabase
            // (функция loadProducts определена в data.js)
            await loadProducts();
            // Затем отрисовываем корзину (теперь массив products заполнен)
            renderCart();
            // Обновляем счётчик товаров в шапке (рядом со словом "Корзина")
            updateCartCount();
        });
    </script>

    <!-- Скрипт переключения тёмной темы (theme.js) -->
    <script src="../js/theme.js"></script>

    <!-- ==================== КОНТЕЙНЕР ДЛЯ УВЕДОМЛЕНИЙ ==================== -->
    <!-- Фиксированный блок в правом верхнем углу для всплывающих сообщений -->
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <!-- ==================== СКРИПТ УВЕДОМЛЕНИЙ (ВСТРОЕННЫЙ) ==================== -->
    <script>
        // Самовызывающаяся функция – изолирует переменные от глобальной области
        (function() {
            // Находим контейнер для уведомлений по id
            const container = document.getElementById('notification-container');
            // Если контейнера нет на странице – выходим
            if (!container) return;

            // Глобальная функция showNotification – будет доступна из любого места
            window.showNotification = function(message, type = 'success', duration = 3000) {
                // Создаём div-элемент уведомления
                const notification = document.createElement('div');
                // Добавляем классы: 'notification' и тип (success/error/warning/info)
                notification.className = 'notification ' + type;

                // Выбираем иконку в зависимости от типа сообщения
                let icon = '✅';
                if (type === 'error') icon = '❌';
                else if (type === 'warning') icon = '⚠️';
                else if (type === 'info') icon = 'ℹ️';

                // Вставляем HTML-содержимое уведомления
                notification.innerHTML = `
                    <span class="icon">${icon}</span>                <!-- Иконка -->
                    <span class="message">${message}</span>          <!-- Текст сообщения -->
                    <button class="close-btn">&times;</button>       <!-- Кнопка закрытия (крестик) -->
                `;
                // Добавляем уведомление в контейнер на странице
                container.appendChild(notification);

                // Находим кнопку закрытия внутри созданного уведомления
                const closeBtn = notification.querySelector('.close-btn');
                // Функция удаления уведомления с анимацией
                const remove = () => {
                    // Запускаем CSS-анимацию исчезновения
                    notification.style.animation = 'fadeOut 0.2s forwards';
                    // Через 200 мс (после окончания анимации) удаляем элемент из DOM
                    setTimeout(() => notification.remove(), 200);
                };
                // Закрытие при клике на крестик
                closeBtn.addEventListener('click', remove);
                // Автоматическое закрытие через duration миллисекунд (если duration > 0)
                if (duration > 0) setTimeout(remove, duration);
            };
            // Отладочное сообщение в консоль, чтобы убедиться, что скрипт загрузился
            console.log('✅ showNotification готов');
        })();
    </script>

</body>
</html>
