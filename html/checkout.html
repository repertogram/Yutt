<!DOCTYPE html>                                  <!-- Объявление типа документа HTML5 -->
<html lang="ru">                                 <!-- Корневой элемент, язык страницы — русский -->
<head>                                           <!-- Метаданные и подключения -->
    <meta charset="UTF-8">                       <!-- Кодировка UTF-8 для корректного отображения кириллицы -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Настройки области просмотра для адаптивности -->
            <!-- Ширина по ширине экрана, масштаб 1 -->
    <title>Оформление заказа</title>            <!-- Заголовок вкладки браузера -->
    <link rel="stylesheet" href="../css/style.css">  <!-- Подключение общих стилей магазина (путь на уровень выше) -->
</head>
<body>                                           <!-- Видимое содержимое страницы -->

    <!-- ==================== ШАПКА САЙТА ==================== -->
    <header>                                     <!-- Верхняя часть сайта -->
        <div class="container">                  <!-- Центрирующий контейнер -->
            <div class="logo">                   <!-- Блок логотипа -->
                <a href="../index.html">Уют</a>   <!-- Ссылка на главную страницу (на уровень выше) -->
            </div>
            <nav>                                <!-- Навигационное меню -->
                <ul>                             <!-- Ненумерованный список -->
                    <li><a href="../index.html">Главная</a></li>      <!-- Пункт "Главная" -->
                    <li><a href="catalog.html">Каталог</a></li>      <!-- Пункт "Каталог" -->
                    <li>                                           <!-- Пункт "Корзина" -->
                        <a href="cart.html" class="cart-link">     <!-- Ссылка на корзину -->
                            Корзина 
                            <span class="cart-count">0</span>       <!-- Счётчик товаров в корзине (обновляется JS) -->
                        </a>
                        <li><a href="admin.html">Админ</a></li>
                    </li>
                </ul>
            </nav>
            <!-- Кнопка переключения светлой/тёмной темы -->
            <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
            <!-- Скрипт переключения темы подключён сразу в шапке (можно и в конце, но здесь для наглядности) -->
            <script src="../js/theme.js"></script>
        </div>
    </header>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ==================== -->
    <main>                                       <!-- Основное содержимое страницы -->
        <div class="container">                  <!-- Центрирующий контейнер -->
            <h1>Оформление заказа</h1>           <!-- Заголовок страницы -->
            
            <!-- ---------- ФОРМА ОФОРМЛЕНИЯ ЗАКАЗА ---------- -->
            <form id="checkout-form" style="max-width: 500px;">   <!-- Форма, ограниченная по ширине для удобства чтения -->
                
                <!-- Поле "Имя" -->
                <div style="margin-bottom: 15px;">
                    <label>Имя: <input type="text" name="name" required style="width: 100%; padding: 8px;"></label>
                </div>
                
                <!-- Поле "Телефон" -->
                <div style="margin-bottom: 15px;">
                    <label>Телефон: <input type="tel" name="phone" required style="width: 100%; padding: 8px;"></label>
                </div>
                
                <!-- Поле "Адрес доставки" (многострочное) -->
                <div style="margin-bottom: 15px;">
                    <label>Адрес доставки: <textarea name="address" required style="width: 100%; padding: 8px;"></textarea></label>
                </div>
                
                <!-- Кнопка отправки формы -->
                <button type="submit" class="btn" style="font-size: 16px;">Подтвердить заказ</button>
            </form>
            
            <!-- Контейнер для сообщения о успешном оформлении заказа -->
            <div id="order-message" style="margin-top: 20px;"></div>
        </div>
    </main>

    <!-- ==================== ПОДКЛЮЧЕНИЕ СКРИПТОВ ==================== -->
    <script src="../js/data.js"></script>        <!-- Данные товаров (для возможных будущих расширений) -->
    <script src="../js/cart.js"></script>        <!-- Логика корзины (функции getCart, updateCartCount и др.) -->
    

<script>
    // ==================== МАСКА ТЕЛЕФОНА + СОХРАНЕНИЕ ЗАКАЗА В LOCALSTORAGE ====================

    const phoneInput = document.querySelector('input[name="phone"]');
    phoneInput.value = '+7 (___) ___-__-__';

    // Функция применения маски
    function applyMask(value) {
        let digits = value.replace(/\D/g, '');
        if (digits.startsWith('7') || digits.startsWith('8')) {
            digits = digits.substring(1);
        }
        digits = digits.substring(0, 10);
        let formatted = '+7';
        if (digits.length > 0) formatted += ' (' + digits.substring(0, 3);
        if (digits.length >= 4) formatted += ') ' + digits.substring(3, 6);
        if (digits.length >= 7) formatted += '-' + digits.substring(6, 8);
        if (digits.length >= 9) formatted += '-' + digits.substring(8, 10);
        // Заполняем оставшиеся подчёркивания
        const totalDigits = digits.length;
        if (totalDigits < 3) formatted += '_'.repeat(3 - totalDigits);
        if (totalDigits < 6) formatted += '_'.repeat(Math.min(3, 6 - Math.max(3, totalDigits)));
        if (totalDigits < 8) formatted += '_'.repeat(Math.min(2, 8 - Math.max(6, totalDigits)));
        if (totalDigits < 10) formatted += '_'.repeat(Math.min(2, 10 - Math.max(8, totalDigits)));
        return formatted;
    }

    phoneInput.addEventListener('focus', function() {
        if (this.value === '+7 (___) ___-__-__') this.select();
    });

    phoneInput.addEventListener('input', function() {
        const cursorPos = this.selectionStart;
        const oldLength = this.value.length;
        const masked = applyMask(this.value);
        this.value = masked;
        const newLength = masked.length;
        let newPos = cursorPos;
        if (oldLength < newLength) newPos = cursorPos + (newLength - oldLength);
        this.setSelectionRange(newPos, newPos);
    });

    phoneInput.addEventListener('blur', function() {
        const digits = this.value.replace(/\D/g, '');
        if (digits === '7' || digits === '') this.value = '+7 (___) ___-__-__';
    });

    // Обработчик отправки формы
    document.getElementById('checkout-form').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. Получаем данные формы
        const name = document.querySelector('input[name="name"]').value.trim();
        const address = document.querySelector('textarea[name="address"]').value.trim();
        let phoneRaw = phoneInput.value;
        let digits = phoneRaw.replace(/\D/g, '');
        if (digits.length > 1 && (digits.startsWith('7') || digits.startsWith('8'))) {
            digits = digits.substring(1);
        }

        // 2. Валидация телефона
        if (digits.length !== 10) {
            showNotification('Введите полный номер телефона (10 цифр после кода)', 'error');
            return;
        }
        const finalPhone = '+7' + digits;

        // 3. Получаем текущую корзину
        const cart = getCart();
        if (cart.length === 0) {
            showNotification('Корзина пуста', 'error');
            return;
        }

        // 4. Формируем объект заказа
        const orderItems = cart.map(item => {
            const product = products.find(p => p.id === item.id);
            return {
                id: item.id,
                name: product ? product.name : 'Товар удалён',
                price: product ? product.price : 0,
                quantity: item.quantity
            };
        });

        const total = getCartTotal();

        const newOrder = {
            id: Date.now(),                         // уникальный ID по времени
            date: new Date().toLocaleString('ru-RU'), // читаемая дата
            customerName: name,
            phone: finalPhone,
            address: address,
            items: orderItems,
            total: total
        };

        // 5. Сохраняем заказ в localStorage
        const orders = JSON.parse(localStorage.getItem('furniture_orders')) || [];
        orders.push(newOrder);
        localStorage.setItem('furniture_orders', JSON.stringify(orders));

        // 6. Очищаем корзину и обновляем счётчик
        localStorage.removeItem('cart');
        updateCartCount();

        // 7. Сообщение об успехе
        document.getElementById('order-message').innerHTML = `
            <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 5px;">
                Спасибо за заказ! Мы свяжемся с вами по номеру ${finalPhone} в ближайшее время.
            </div>
        `;

        // 8. Сбрасываем форму
        e.target.reset();
        phoneInput.value = '+7 (___) ___-__-__';
    });
</script>

    <!-- ==================== КОНТЕЙНЕР ДЛЯ УВЕДОМЛЕНИЙ ==================== -->
    <!-- Фиксированный блок в правом верхнем углу для показа всплывающих сообщений -->
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    
    <!-- ==================== СКРИПТ УВЕДОМЛЕНИЙ (ВСТРОЕННЫЙ) ==================== -->
    <script>
    (function() {                                          // Самовызывающаяся функция для изоляции
        const container = document.getElementById('notification-container');  // Находим контейнер
        if (!container) return;                            // Если контейнера нет — выходим

        // Глобальная функция показа уведомлений
        window.showNotification = function(message, type = 'success', duration = 3000) {
            const notification = document.createElement('div');   // Создаём элемент уведомления
            notification.className = 'notification ' + type;      // Добавляем классы (notification и тип: success/error/warning/info)
            
            // Выбор иконки в зависимости от типа
            let icon = '✅';
            if (type === 'error') icon = '❌';
            else if (type === 'warning') icon = '⚠️';
            else if (type === 'info') icon = 'ℹ️';

            // Внутренняя структура уведомления
            notification.innerHTML = `
                <span class="icon">${icon}</span>                <!-- Иконка -->
                <span class="message">${message}</span>          <!-- Текст сообщения -->
                <button class="close-btn">&times;</button>       <!-- Кнопка закрытия (крестик) -->
            `;
            container.appendChild(notification);                  // Добавляем в контейнер

            const closeBtn = notification.querySelector('.close-btn');  // Находим кнопку закрытия
            // Функция удаления уведомления с анимацией
            const remove = () => {
                notification.style.animation = 'fadeOut 0.2s forwards';  // Запускаем CSS-анимацию исчезновения
                setTimeout(() => notification.remove(), 200);            // Удаляем элемент после завершения анимации
            };
            closeBtn.addEventListener('click', remove);           // Закрытие по клику на крестик
            if (duration > 0) setTimeout(remove, duration);      // Автоматическое закрытие через duration мс
        };
        console.log('✅ showNotification готов');                // Отладочное сообщение
    })();
    </script>

</body>
</html>
